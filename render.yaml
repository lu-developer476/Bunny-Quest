databases:
  - name: conejo-aventura-db
    plan: free
    databaseName: conejo_aventura
    user: conejo_aventura

services:
  - type: web
    name: conejo-aventura
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn bunnyquest.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: conejo-aventura-db
          property: connectionString
